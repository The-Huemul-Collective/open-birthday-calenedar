name: BirthdayCalendar
options:
  bundleIdPrefix: com.open
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BirthdayCalendar:
    type: application
    platform: iOS
    sources:
      - path: BirthdayCalendar
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.open.BirthdayCalendar
        INFOPLIST_FILE: BirthdayCalendar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BirthdayCalendar/Resources/BirthdayCalendar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: BirthdayWidgets
        embed: true

  BirthdayWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: BirthdayWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.open.BirthdayCalendar.widgets
        INFOPLIST_FILE: BirthdayWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: BirthdayWidgets/BirthdayWidgets.entitlements
